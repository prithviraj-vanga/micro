<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
    color: white;
}

/* Container */
.main {
    width: 90%;
    margin: auto;
    text-align: center;
    padding: 20px;
}

/* Heading */
h1 {
    margin-bottom: 40px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.cards div {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    padding: 20px;
    border-radius: 15px;
    color: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    animation: fadeIn 0.5s ease-in;
}

.cards div:hover {
    transform: translateY(-9px);
    box-shadow: 0 10px 25px rgba(209, 202, 202, 0.5);
}

.cards p {
    font-size: 28px;
    font-weight: bold;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #0072ff;
    color: white;
}

th, td {
    padding: 10px;
    text-align: center;
    border:1.2px solid rgb(65, 61, 61);
}

tr:nth-child(even) {
    background: #f2f2f2;
}

tr:hover {
    background: #d0dce9;
    transition: 0.3s;
    
}

/* Buttons */
button {
    padding: 8px 15px;
    margin: 3px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #0072ff, #00c6ff);
}

/* Logout button */
.log {
    margin-top: 20px;
    padding: 10px 25px;
    background: red;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(21px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="main">
    <h1>Admin Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
        <div>
            <h3>Total</h3>
            <p id="total">0</p>
        </div>
        <div>
            <h3>Resolved</h3>
            <p id="resolved">0</p>
        </div>
        <div>
            <h3>Pending</h3>
            <p id="pending">0</p>
        </div>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Complaint</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="log" onclick="logout()">Logout</button>
</div>

<script>

// Check login
if (localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "login.html";
}

// Load complaints
function loadComplaints() {
    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    let total = 0;
    let resolved = 0;
    let pending = 0;

    for (let i = 0; i < localStorage.length; i++) {

        let key = localStorage.key(i);

        if (key === "adminLoggedIn") continue;

        let data = JSON.parse(localStorage.getItem(key));

        total++;

        if (data.status === "Resolved") {
            resolved++;
        } else {
            pending++;
        }

        let row = `<tr>
            <td>${key}</td>
            <td>${data.name}</td>
            <td>${data.email}</td>
            <td>${data.department}</td>
            <td>${data.complaint}</td>
            <td>${data.status}</td>
            <td>
                <button onclick="updateStatus('${key}')">Resolve</button>
                <button onclick="deleteComplaint('${key}')">Delete</button>
            </td>
        </tr>`;

        table.innerHTML += row;
    }

    // Update cards
    document.getElementById("total").innerText = total;
    document.getElementById("resolved").innerText = resolved;
    document.getElementById("pending").innerText = pending;
}

// Update status
function updateStatus(id) {
    let data = JSON.parse(localStorage.getItem(id));
    data.status = "Resolved";

    localStorage.setItem(id, JSON.stringify(data));
    loadComplaints();
}

// Delete complaint
function deleteComplaint(id) {
    localStorage.removeItem(id);
    loadComplaints();
}

// Logout
function logout() {
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "login.html";
}

// Load data
loadComplaints();

</script>

</body>
</html>
